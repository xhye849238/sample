<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<link rel="stylesheet" href="styles.css">
<title></title>

<body>
<div class="carousel">
<button class="carousel__button carousel__button--left">
<img src="left.png">
</button>

<div class="carousel__track-container">
<ul class="carousel__track">
<li class="carousel__slide curent-slide"><img class="carousel__image" src="me.png"><li>
<li class="carousel__slide"><img class="carousel__image" src="moon.png"><li>
<li class="carousel__slide"><img class="carousel__image" src="upd.png"><li>
<li class="carousel__slide"><img class="carousel__image" src="sunset3.png"><li>
<li class="carousel__slide"><img class="carousel__image" src="cat2.png"><li>
<li class="carousel__slide"><img class="carousel__image" src="tulips.png"><li>
<li class="carousel__slide"><img class="carousel__image" src="sunset2.png"><li>
<li class="carousel__slide"><img class="carousel__image" src="cat1.png"><li>
<li class="carousel__slide"><img class="carousel__image" src="sunset1.png"><li>
</ul>
</div>

<button class="carousel__button carousel__button--right">
<img src="right.png"></button>

<div class="carousel__nav">
<button class="carousel__indicator current-slide"></button>
<button class="carousel__indicator"></button>
<button class="carousel__indicator"></button>
<button class="carousel__indicator"></button>
<button class="carousel__indicator"></button>
<button class="carousel__indicator"></button>
<button class="carousel__indicator"></button>
<button class="carousel__indicator"></button>
<button class="carousel__indicator"></button>
</div>

  <script src="js/carousel.js"></script>
</body>
</html>
